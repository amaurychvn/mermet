name: Génération des prédictions
on:
  schedule:
    - cron: '0 7 * * *'  # 7h UTC, 30 min après le scraping
  workflow_dispatch:
permissions:
  contents: write
jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python predict_pump.py
      - name: Commit et push si changements
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git pull --rebase --autostash
          if [[ -n $(git status -s) ]]; then
            git add index.html predictions.csv predictions/
            git commit -m "Auto-update: prédictions du jour"
            git push
            echo "Prédictions mises à jour."
          else
            echo "Aucun changement à committer."
          fi
