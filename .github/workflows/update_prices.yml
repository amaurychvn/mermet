name: Mise à jour Prix Pétrole

on:
  schedule:
    - cron: '30 6 * * *' # Tous les jours à ~7h30/8h30 en France
  workflow_dispatch: # Permet de lancer manuellement pour tester

# Ces permissions permettent au bot d'écrire dans ton dépôt privé
permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraping script
        run: python petrole.py

      - name: Commit and push if changes
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          
          # Vérifie s'il y a des changements
          if [[ -n $(git status -s) ]]; then
            git add prix_carburants_quotidien.csv
            git commit -m "Auto-update: Données de 17h"
            git push
            echo "✅ Mise à jour effectuée et sauvegardée."
          else
            echo "⚠️ Aucun changement détecté (peut-être pas de nouvelles données)."
          fi
